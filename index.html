<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Makola Digital Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Makola Digital Hub</h1>
        <p>Direct vendor dispatch. Localized WhatsApp checkout automation.</p>
    </header>

    <main>
        <h2>Featured Inventory</h2>
        <div id="product-grid" class="product-grid">
            
            <div class="product-card" data-id="sneaker" data-price="350.00" data-name="Premium Canvas Sneaker">
                <div class="product-image-placeholder">
                    <img src="assets/sneaker.png" alt="Premium Canvas Sneaker">
                </div>
                <h3>Premium Canvas Sneaker</h3>
                <p class="price">GHS 350.00</p>
                
                <div class="quantity-control">
                    <button class="qty-btn minus-btn">-</button>
                    <span class="qty-count">0</span>
                    <button class="qty-btn plus-btn">+</button>
                </div>
            </div>

            <div class="product-card" data-id="tee" data-price="180.00" data-name="Vintage Graphic Tee">
                <div class="product-image-placeholder">
                    <img src="assets/tee.png" alt="Vintage Graphic Tee">
                </div>
                <h3>Vintage Graphic Tee</h3>
                <p class="price">GHS 180.00</p>
                
                <div class="quantity-control">
                    <button class="qty-btn minus-btn">-</button>
                    <span class="qty-count">0</span>
                    <button class="qty-btn plus-btn">+</button>
                </div>
            </div>

        </div>
    </main>

    <section class="checkout-form-section">
        <div class="form-header-row">
            <h3>Delivery Details</h3>
            <button type="button" id="clear-cart-btn" class="clear-btn">Clear Form & Cart</button>
        </div>
        
        <div class="form-group">
            <label for="customer-name">Your Full Name:</label>
            <input type="text" id="customer-name" placeholder="e.g., Kwame Mensah" autocomplete="off">
            <span class="error-msg" id="name-error"></span>
        </div>
        <div class="form-group">
            <label for="customer-address">Delivery Address / Location:</label>
            <input type="text" id="customer-address" placeholder="e.g., Adenta Rosa Rosa Bus Stop" autocomplete="off">
            <span class="error-msg" id="address-error"></span>
        </div>
    </section>

    <div class="checkout-bar">
        <div class="cart-summary">
            Items Selected: <span id="cart-count">0</span> | 
            Total: <span id="cart-total">GHS 0.00</span>
        </div>
        <button id="checkout-btn" class="checkout-btn">Review WhatsApp Order</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
